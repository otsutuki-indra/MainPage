<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HellCrop - Scale Your Growth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            /* Integrating the triangular theme pattern */
            background-image: 
                linear-gradient(to bottom, rgba(10, 10, 10, 0.8), #0a0a0a),
                url('theme.png'); 
            background-size: cover;
            background-attachment: fixed;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        /* Fast Moving Bubbles */
        .bg-animation {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #2a5f2a, transparent);
            opacity: 0.2;
            filter: blur(40px);
            animation: moveFast 4s infinite alternate ease-in-out;
        }

        .b1 { width: 300px; height: 300px; top: 10%; left: 10%; }
        .b2 { width: 400px; height: 400px; bottom: 10%; right: 10%; animation-duration: 3s; }

        @keyframes moveFast {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(150px, 100px) scale(1.2); }
        }

        /* Glassmorphic Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .logo { font-size: 1.8rem; font-weight: 900; color: #fff; letter-spacing: -1px; }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hero h1 {
            font-size: 5rem;
            background: linear-gradient(to right, #fff, #2a5f2a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .btn-primary {
            background: #2a5f2a;
            color: white;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-primary:hover {
            box-shadow: 0 0 20px #2a5f2a;
            transform: translateY(-3px);
        }

        /* Footer from image lik.png */
        footer {
            padding: 2rem;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.9rem;
            color: #666;
            z-index: 10;
            position: relative;
        }

        .footer-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .footer-content a { color: #888; text-decoration: none; }
        .footer-content a:hover { color: #fff; }
        .social-icons { margin-left: 15px; display: flex; gap: 10px; border-left: 1px solid #333; padding-left: 15px; }

    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
    </div>

    <nav>
        <div class="logo">ᎻᎬᏞᏞᏟᎡᎾᏢ</div>
        <div style="display:flex; gap:20px; align-items:center;">
            <a href="#" style="color:#aaa; text-decoration:none;">Home</a>
            <a href="#" class="btn-primary">Start Now</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Grow Without Limits</h1>
        <p style="color:#888; max-width:600px; margin-bottom:2rem;">
            Enterprise-grade infrastructure meeting the triangular geometric precision of the future.
        </p>
        <a href="#" class="btn-primary">Start Free Trial</a>
    </section>

    <footer>
        <div class="footer-content">
            <span>© 2026 HellCrop. All rights reserved.</span>
            <span>|</span>
            <a href="#">Home</a>
            <span>|</span>
            <a href="#">Terms of Use</a>
            <span>|</span>
            <a href="#">Sign In</a>
            <div class="social-icons">
                <span>𝕏</span>
                <span>▶</span>
                <span>📷</span>
            </div>
        </div>
    </footer>

</body>
</html>
