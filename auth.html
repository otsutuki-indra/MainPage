<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HELLCORP — ACCESS GRANTED</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --hell-red: #FF0022;
    --light-bg: #F8F8F8;
    --light-gray: #EDEDED;
    --mid-gray: #D4D4D4;
    --dark-text: #1A1A1A;
    --dim-text: #555555;
    --glow: rgba(255,0,34,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, var(--light-bg) 0%, #FFFFFF 100%);
    color: var(--dark-text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* Light subtle grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(var(--mid-gray) 1px, transparent 1px),
      linear-gradient(90deg, var(--mid-gray) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.06;
    pointer-events: none;
  }

  .card {
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--mid-gray);
    border-radius: 16px;
    padding: 60px 50px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    backdrop-filter: blur(12px);
    position: relative;
    z-index: 10;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    text-align: center;
    color: var(--hell-red);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .logo span { color: var(--dark-text); }

  .subtitle {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    color: var(--hell-red);
    margin-bottom: 50px;
    text-transform: uppercase;
  }

  .tab-bar {
    display: flex;
    border-bottom: 2px solid var(--light-gray);
    margin-bottom: 40px;
  }
  .tab {
    flex: 1;
    padding: 16px 0;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    letter-spacing: 0.2em;
    color: var(--dim-text);
    cursor: pointer;
    transition: all 0.3s;
  }
  .tab.active {
    color: var(--hell-red);
    border-bottom: 3px solid var(--hell-red);
  }

  .form-group {
    margin-bottom: 32px;
    position: relative;
  }
  .form-input {
    width: 100%;
    padding: 14px 0;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--mid-gray);
    color: var(--dark-text);
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.3s;
  }
  .form-input:focus {
    border-bottom-color: var(--hell-red);
  }
  .form-label {
    position: absolute;
    top: -8px;
    left: 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--hell-red);
    opacity: 0;
    transition: all 0.3s;
  }
  .form-input:focus ~ .form-label,
  .form-input:not(:placeholder-shown) ~ .form-label {
    opacity: 1;
    top: -26px;
  }

  .btn-auth {
    width: 100%;
    background: var(--hell-red);
    color: white;
    border: none;
    padding: 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 700;
    margin-top: 20px;
    cursor: pointer;
    transition: all 0.4s;
  }
  .btn-auth:hover {
    background: #FF4500;
    box-shadow: 0 0 40px var(--glow);
    transform: translateY(-2px);
  }

  .forgot {
    text-align: center;
    margin-top: 30px;
    font-size: 0.85rem;
    color: var(--dim-text);
  }
  .forgot a {
    color: var(--hell-red);
    text-decoration: none;
  }

  footer {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--dim-text);
  }
  footer a {
    color: var(--dim-text);
    text-decoration: none;
    margin: 0 12px;
  }
  footer a:hover { color: var(--hell-red); }
</style>
</head>
<body>

  <div class="card">
    <div class="logo">HELL<span>CORP</span></div>
    <div class="subtitle">SECURE ACCESS</div>

    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(0)">SIGN IN</div>
      <div class="tab" onclick="switchTab(1)">SIGN UP</div>
    </div>

    <!-- Sign In -->
    <div id="login-form">
      <div class="form-group">
        <input type="email" class="form-input" placeholder="you@domain.com" id="login-email">
        <label class="form-label">EMAIL ADDRESS</label>
      </div>
      <div class="form-group">
        <input type="password" class="form-input" placeholder="••••••••" id="login-pass">
        <label class="form-label">PASSWORD</label>
      </div>
      <button onclick="fakeLogin()" class="btn-auth">INITIATE ACCESS →</button>
      <div class="forgot"><a href="#">FORGOT PROTOCOL?</a></div>
    </div>

    <!-- Sign Up -->
    <div id="register-form" style="display:none;">
      <div class="form-group">
        <input type="text" class="form-input" placeholder="CALLSIGN" id="reg-name">
        <label class="form-label">FULL NAME</label>
      </div>
      <div class="form-group">
        <input type="email" class="form-input" placeholder="inferno@hellcorp.io" id="reg-email">
        <label class="form-label">EMAIL ADDRESS</label>
      </div>
      <div class="form-group">
        <input type="password" class="form-input" placeholder="••••••••" id="reg-pass">
        <label class="form-label">CREATE PASSWORD</label>
      </div>
      <button onclick="fakeRegister()" class="btn-auth">BURN ACCOUNT →</button>
    </div>
  </div>

  <footer>
    © 2026 HELLCORP • 
    <a href="/">HOME</a> • 
    <a href="#">TERMS</a> • 
    <a href="#">PRIVACY</a>
  </footer>

  <script>
    function switchTab(n) {
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===n));
      document.getElementById('login-form').style.display = n===0 ? 'block' : 'none';
      document.getElementById('register-form').style.display = n===1 ? 'block' : 'none';
    }

    function fakeLogin() {
      alert("🔥 ACCESS GRANTED — WELCOME TO HELLCORP");
      setTimeout(() => window.location.href = '/', 800);
    }

    function fakeRegister() {
      alert("🔥 ACCOUNT FORGED — YOU ARE NOW PART OF HELLCORP");
      setTimeout(() => window.location.href = '/', 1000);
    }
  </script>
</body>
</html>
